spring:
  application:
    name: scoreflux
  # Perfil padrão: H2 em arquivo (zero instalação), em modo de compatibilidade PostgreSQL.
  # Quando o PostgreSQL estiver instalado, rode com: --spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:file:./data/scoreflux;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  # Provedores de deploy (Render etc.) injetam a porta via variável PORT.
  port: ${PORT:8080}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    # Aceita uma URL JDBC completa em SPRING_DATASOURCE_URL (ex.: Neon/Supabase) OU
    # monta a partir de host/porta/nome (ex.: propriedades do banco no Blueprint do Render).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scoreflux}}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:scoreflux}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:scoreflux}}
