spring:
  application:
    name: scoreflux
  # Perfil padrão: H2 em arquivo (zero instalação), em modo de compatibilidade PostgreSQL.
  # Quando o PostgreSQL estiver instalado, rode com: --spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:file:./data/scoreflux;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/scoreflux
    driver-class-name: org.postgresql.Driver
    username: scoreflux
    password: scoreflux
